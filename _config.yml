# GitHub Pages Configuration
title: 60 Projects Collection
description: 60 Projects Collection - Part of the 60-Repo Evolution Project
theme: jekyll-theme-cayman

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude files
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - README.md
  - LICENSE

# Social links
github:
  repository_url: https://github.com/mk-knight23/60-Projects

# Analytics
google_analytics: # Add your GA tracking ID
